<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green POS Mini - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --bg: #f4f7f4; --white: #ffffff; }
        body { 
            font-family: 'Sarabun', sans-serif; margin: 0; background: var(--bg); 
            padding-bottom: 70px; font-size: 13px; color: #2c3e50; 
        }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 55px; background: var(--white); display: flex; box-shadow: 0 -1px 5px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #bdc3c7; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .card { background: var(--white); border-radius: 10px; padding: 10px; margin-bottom: 6px; border: 1px solid #e0e6e0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        .btn-green { background: var(--primary); color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Sarabun'; font-size: 13px; }
        input { width: 100%; padding: 8px; margin-bottom: 6px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Sarabun'; }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 8px; border: 1px solid var(--primary); background: #000; max-height: 200px; }
        
        .hidden { display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--white); padding: 15px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; overflow: hidden; }
        
        /* แก้ไขตรงนี้: จำกัดขนาด Barcode ไม่ให้ทะลุจอ */
        #zoom-bc { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin: 10px auto;
        }
        
        h3 { margin: 0 0 8px 0; font-size: 14px; color: var(--primary); }
        .barcode-svg { width: 70px; height: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-receipts">
        <button class="btn-green" style="margin-bottom:10px" onclick="showPage('add-product')">+ เพิ่มสินค้าใหม่</button>
        <div id="receipt-list"></div>
    </div>

    <div id="page-store" class="hidden">
        <div style="text-align: center;">
            <button style="font-size:28px; background:none; border:none; cursor:pointer;" onclick="toggleScanner()">📸</button>
            <div id="reader"></div>
            <p id="scan-status" style="font-size: 11px; margin: 4px 0;">พร้อมสแกน</p>
        </div>
        
        <div id="cart-preview" class="card hidden" style="background: #eef9f1; border: 1px solid var(--primary);">
            <div id="cart-items" style="font-size: 12px; margin-bottom: 6px;"></div>
            <button class="btn-green" onclick="finalizeReceipt()">สร้างใบเสร็จอิเล็กทรอนิกส์</button>
        </div>
        
        <h3 style="font-size: 12px; margin-top: 10px;">สต็อกสินค้า</h3>
        <div id="product-list"></div>
    </div>

    <div id="page-add-product" class="hidden">
        <h3>เพิ่มข้อมูลสินค้า</h3>
        <input type="text" id="p-name" placeholder="ชื่อสินค้า">
        <input type="number" id="p-price" placeholder="ราคา">
        <button class="btn-green" onclick="saveProduct()">บันทึก</button>
        <button onclick="showPage('receipts')" style="width:100%; background:none; border:none; margin-top:8px; color:gray; font-size:12px;">ยกเลิก</button>
    </div>
</div>

<div id="main-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
        <button class="btn-green" style="margin-top:10px" onclick="closeModal()">ปิด</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showPage('receipts')"><span>📄</span>ใบเสร็จ</div>
    <div class="nav-item" onclick="showPage('store')"><span>🏷️</span>คลังสินค้า</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDq6EmQIx-Ue4qpUN5peHJXQRFOIUKz270",
        authDomain: "yaya-9f825.firebaseapp.com",
        databaseURL: "https://yaya-9f825-default-rtdb.firebaseio.com",
        projectId: "yaya-9f825",
        appId: "1:453307070864:web:24476eed907da173c69b15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let products = [], currentCart = {}, isCooldown = false;
    let scanner = null;

    function playLoudBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.12);
    }

    onValue(ref(db, 'products'), s => { products = s.val() ? Object.values(s.val()) : []; renderProducts(); });
    onValue(ref(db, 'receipts'), s => { renderReceipts(s.val() ? Object.values(s.val()).reverse() : []); });

    window.showPage = (p) => {
        ['page-receipts', 'page-store', 'page-add-product'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('page-' + p).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', (i===0 && p==='receipts') || (i===1 && p==='store')));
        if(p !== 'store' && scanner) { scanner.stop(); document.getElementById('reader').style.display='none'; }
    };

    window.saveProduct = () => {
        const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value;
        if(name && price) {
            push(ref(db, 'products'), { id: "P"+Math.floor(1000 + Math.random() * 9000), name, price: parseFloat(price) });
            showPage('store');
        }
    };

    window.toggleScanner = () => {
        const r = document.getElementById('reader');
        if (r.style.display === 'block') { scanner.stop(); r.style.display = 'none'; }
        else {
            r.style.display = 'block';
            if(!scanner) scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: {width: 180, height: 100} }, (text) => {
                if(isCooldown) return;
                const p = products.find(i => i.id === text);
                if(p) {
                    playLoudBeep();
                    if(currentCart[p.id]) currentCart[p.id].qty += 1;
                    else currentCart[p.id] = { ...p, qty: 1 };
                    isCooldown = true;
                    document.getElementById('scan-status').innerHTML = `<b style="color:var(--primary)">✔ สแกนแล้ว</b>`;
                    setTimeout(() => { isCooldown = false; document.getElementById('scan-status').innerText = "พร้อมสแกน"; }, 2000);
                    updateCart();
                }
            });
        }
    };

    function updateCart() {
        const preview = document.getElementById('cart-preview');
        preview.classList.remove('hidden');
        const itemsArray = Object.values(currentCart);
        const total = itemsArray.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-items').innerHTML = `รวม ${itemsArray.length} ชนิด | <b>฿${total}</b>`;
    }

    window.finalizeReceipt = () => {
        const rid = Math.floor(1000 + Math.random() * 9000);
        const itemsArray = Object.values(currentCart);
        const total = itemsArray.reduce((s, i) => s + (i.price * i.qty), 0);
        push(ref(db, 'receipts'), { 
            name: `ใบเสร็จอิเล็กทรอนิกส์ .... ${rid}`, 
            items: itemsArray, total: total, 
            date: new Date().toLocaleString('th-TH', {timeStyle:'short', dateStyle:'short'}) 
        });
        currentCart = {}; document.getElementById('cart-preview').classList.add('hidden'); showPage('receipts');
    };

    function renderProducts() {
        const list = document.getElementById('product-list'); list.innerHTML = '';
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card flex-between';
            div.innerHTML = `<div><b>${p.name}</b><br>฿${p.price}</div><svg id="bc-${p.id}" class="barcode-svg" onclick="zoomBarcode('${p.id}')"></svg>`;
            list.appendChild(div);
            JsBarcode(`#bc-${p.id}`, p.id, { height: 20, width: 1.1, fontSize: 10, margin: 0 });
        });
    }

    function renderReceipts(data) {
        const list = document.getElementById('receipt-list'); list.innerHTML = '';
        data.forEach(r => {
            const div = document.createElement('div'); div.className = 'card flex-between'; div.onclick = () => viewReceipt(r);
            div.innerHTML = `<div><b>${r.name}</b><br><small>${r.date}</small></div><div style="color:var(--primary); font-weight:bold;">฿${r.total}</div>`;
            list.appendChild(div);
        });
    }

    window.zoomBarcode = (id) => {
        document.getElementById('modal-body').innerHTML = `<h3>รหัสสินค้า: ${id}</h3><svg id="zoom-bc"></svg>`;
        document.getElementById('main-modal').style.display = 'flex';
        // ใช้ width และ height ที่พอเหมาะสำหรับหน้าจอขนาดเล็ก
        JsBarcode("#zoom-bc", id, { 
            width: 2, 
            height: 100,
            displayValue: false
        });
    };

    window.viewReceipt = (r) => {
        let items = r.items.map(i => `<div class="flex-between"><span>${i.name} x${i.qty}</span><span>฿${i.price * i.qty}</span></div>`).join('');
        document.getElementById('modal-body').innerHTML = `<h3>${r.name}</h3><small>${r.date}</small><hr style="border:0.5px solid #eee;">${items}<hr><b>รวมสุทธิ ฿${r.total}</b>`;
        document.getElementById('main-modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('main-modal').style.display = 'none';
</script>
</body>
</html>
