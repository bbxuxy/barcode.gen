<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green POS - Firebase</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq6EmQIx-Ue4qpUN5peHJXQRFOIUKz270",
            authDomain: "yaya-9f825.firebaseapp.com",
            databaseURL: "https://yaya-9f825-default-rtdb.firebaseio.com",
            projectId: "yaya-9f825",
            storageBucket: "yaya-9f825.firebasestorage.app",
            messagingSenderId: "453307070864",
            appId: "1:453307070864:web:24476eed907da173c69b15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global Variables
        window.products = [];
        window.receipts = [];
        let currentCart = [];
        const scanner = new Html5Qrcode("reader");

        // Sync Products
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            window.products = data ? Object.values(data) : [];
            renderStore();
        });

        // Sync Receipts
        onValue(ref(db, 'receipts'), (snapshot) => {
            const data = snapshot.val();
            window.receipts = data ? Object.values(data).reverse() : [];
            renderReceipts();
        });

        // Functions to be accessed from HTML
        window.saveProduct = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            if(name && price) {
                const id = "ID" + Math.floor(Math.random() * 9000 + 1000);
                push(ref(db, 'products'), { id, name, price: parseFloat(price) });
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                switchPage('store');
            }
        };

        window.finalizeReceipt = () => {
            const total = currentCart.reduce((s, i) => s + i.price, 0);
            const receipt = {
                id: "#" + Math.floor(Math.random() * 10000),
                total: total,
                count: currentCart.length,
                time: new Date().toLocaleString('th-TH')
            };
            push(ref(db, 'receipts'), receipt);
            currentCart = [];
            document.getElementById('btn-finalize').classList.add('hidden');
            document.getElementById('scan-preview').innerText = '';
            alert("สร้างใบเสร็จเรียบร้อย!");
            switchPage('receipts');
        };

        window.toggleScanner = () => {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === 'block') {
                scanner.stop();
                readerDiv.style.display = 'none';
            } else {
                readerDiv.style.display = 'block';
                scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                    const p = window.products.find(prod => prod.id === text);
                    if(p) {
                        currentCart.push(p);
                        document.getElementById('scan-preview').innerText = `สแกนพบ: ${p.name} (${currentCart.length} ชิ้น)`;
                        document.getElementById('btn-finalize').classList.remove('hidden');
                    }
                });
            }
        };
    </script>

    <style>
        :root { --primary-green: #27ae60; --light-green: #eef9f1; --white: #ffffff; --text: #2c3e50; }
        body { font-family: sans-serif; margin: 0; background-color: var(--white); padding-bottom: 80px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--white); display: flex; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: #bdc3c7; }
        .nav-item.active { color: var(--primary-green); }
        .container { padding: 15px; }
        .btn-green { background: var(--primary-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .receipt-card { background: var(--light-green); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; border: 1px solid #d4efdf; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { background: var(--white); border: 1px solid #eee; padding: 10px; border-radius: 12px; text-align: center; }
        .hidden { display: none; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-receipts">
        <button class="btn-green" onclick="showAddProduct()">+ เพิ่มและจัดการรายการสินค้า</button>
        <div id="receipt-list"></div>
    </div>

    <div id="page-store" class="hidden">
        <button style="font-size:40px; background:none; border:none; display:block; margin:0 auto;" onclick="toggleScanner()">📸</button>
        <div id="reader"></div>
        <div id="scan-preview" style="text-align: center; margin: 10px 0; font-weight: bold;"></div>
        <button id="btn-finalize" class="btn-green hidden" onclick="finalizeReceipt()">สร้างใบเสร็จ</button>
        <h3>คลังบาร์โค้ด</h3>
        <div id="product-list" class="product-grid"></div>
    </div>

    <div id="page-add-product" class="hidden">
        <h3>เพิ่มสินค้าใหม่</h3>
        <input type="text" id="p-name" placeholder="ชื่อสินค้า" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="number" id="p-price" placeholder="ราคา (บาท)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <button class="btn-green" onclick="saveProduct()">บันทึก</button>
        <button onclick="switchPage('receipts')" style="width:100%; background:none; border:none; color:gray;">ยกเลิก</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchPage('receipts')"><span>📄</span><br>หน้าหลัก</div>
    <div class="nav-item" onclick="switchPage('store')"><span>🏷️</span><br>My Store</div>
</nav>

<script>
    function switchPage(page) {
        document.getElementById('page-receipts').classList.toggle('hidden', page !== 'receipts');
        document.getElementById('page-store').classList.toggle('hidden', page !== 'store');
        document.getElementById('page-add-product').classList.add('hidden');
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.toggle('active', (i === 0 && page === 'receipts') || (i === 1 && page === 'store'));
        });
    }

    function showAddProduct() {
        document.getElementById('page-receipts').classList.add('hidden');
        document.getElementById('page-add-product').classList.remove('hidden');
    }

    function renderStore() {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        window.products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<strong>${p.name}</strong><br><span style="color:green">${p.price}.-</span><br><svg id="code-${p.id}"></svg>`;
            list.appendChild(card);
            JsBarcode(`#code-${p.id}`, p.id, { height: 30, width: 1.5, fontSize: 10 });
        });
    }

    function renderReceipts() {
        const list = document.getElementById('receipt-list');
        list.innerHTML = '';
        window.receipts.forEach(r => {
            list.innerHTML += `<div class="receipt-card"><div><strong>ใบเสร็จ ${r.id}</strong><br><small>${r.time}</small></div><div style="font-weight:bold; color:green">฿${r.total}</div></div>`;
        });
    }
</script>
</body>
</html>
